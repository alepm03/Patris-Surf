<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patris Surf — Donostia</title>
    <script>
      // GitHub Pages SPA: restore route from query param set by 404.html
      (function () {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null, decodeURIComponent(p[1]));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
