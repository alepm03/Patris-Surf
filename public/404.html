<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect trick for GitHub Pages.
      // Converts the 404 path back into a query param so the root index.html
      // can read it and push the correct route via history.replaceState.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
</html>
